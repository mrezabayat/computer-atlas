name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Type-check (Astro + TypeScript) and validate content schemas
        run: npm run check

      - name: Build site (fails on broken topic references and bad frontmatter)
        run: npm run build

      - name: Upload built site as artifact
        uses: actions/upload-artifact@v4
        with:
          name: site
          path: dist
          retention-days: 7
          if-no-files-found: error
