name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Type-check (Astro + TypeScript) and validate content schemas
        run: npm run check

      - name: Lint content (standardized headings, no TODOs in reviewed topics)
        run: npm run lint:content

      - name: Build site (fails on broken topic references and bad frontmatter)
        run: npm run build

      - name: Audit orphans (informational)
        run: npm run audit:orphans || true

      - name: Audit importance / Ring N completeness (informational)
        run: npm run audit:importance || true

      # Informational until Phase 3 of docs/enrichment-plan.md; then switch
      # to `npm run audit:taxonomy -- --strict` (no `|| true`).
      - name: Audit taxonomy / enrichment progress (informational)
        run: npm run audit:taxonomy || true

      - name: Upload built site as artifact
        uses: actions/upload-artifact@v4
        with:
          name: site
          path: dist
          retention-days: 7
          if-no-files-found: error
